# ===================================================================
# DATABASE - PostgreSQL
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/pharmacy_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA / Hibernate
# ===================================================================
spring.jpa.hibernate.ddl-auto=create-drop
# Bật SQL log để kiểm chứng cache MISS (lần 1) và cache HIT (lần 2 không có SQL)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Hibernate 7 tu dong detect PostgreSQL dialect tu JDBC driver, khong can khai bao thu cong
# Đảm bảo data.sql chạy SAU khi Hibernate tạo bảng xong
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ===================================================================
# REDIS - Cache Provider
# ===================================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Chọn Redis làm Cache Provider
spring.cache.type=redis
# TTL mặc định: 10 phút (ms)
spring.cache.redis.time-to-live=600000
# Không cache giá trị null
spring.cache.redis.cache-null-values=false

# ===================================================================
# APPLICATION
# ===================================================================
spring.application.name=pharmacy-cache-demo
